version: 2.1

orbs:
  node: circleci/node@5

jobs:
  ci-build:
    executor:
      name: node/default
      tag: "20.19"
    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: CI - Build Angular project
          command: npm run build

      - persist_to_workspace:
          root: .
          paths:
            - dist

      - store_artifacts:
          path: dist
          destination: angular-build

  testing:
    executor:
      name: node/default
      tag: "20.19"
    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Testing - Run unit tests
          command: CI=1 npm test -- --watch=false

  delivery:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout

      - attach_workspace:
          at: .

      - add_ssh_keys:
          fingerprints:
            - "SHA256:3ZolXeSG+6BOaJjWMujBO137eN0QwxSX550Hx6IFlt4"

      - run:
          name: Delivery - Install deployment tools
          command: |
            sudo apt-get update
            sudo apt-get install -y rsync openssh-client

      - run:
          name: Delivery - Add droplet to known_hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - run:
          name: Delivery - Validate required environment variables
          command: |
            if [ -z "$DROPLET_HOST" ]; then
              echo "ERROR: DROPLET_HOST no está configurado"
              exit 1
            fi

            if [ -z "$DROPLET_USER" ]; then
              echo "ERROR: DROPLET_USER no está configurado"
              exit 1
            fi

            if [ -z "$DEPLOY_PATH" ]; then
              echo "ERROR: DEPLOY_PATH no está configurado"
              exit 1
            fi

            echo "Variables de entorno requeridas configuradas correctamente"

      - run:
          name: Delivery - Detect Angular build folder
          command: |
            echo "Contenido de dist:"
            find dist -maxdepth 3 -type d

      - run:
          name: Delivery - Deploy Angular app to DigitalOcean Droplet
          command: |
            BUILD_DIR=$(find dist -name index.html -exec dirname {} \; | head -n 1)

            if [ -z "$BUILD_DIR" ]; then
              echo "ERROR: No se encontró index.html dentro de dist/"
              exit 1
            fi

            echo "Deploying from: $BUILD_DIR"
            rsync -avz --delete "$BUILD_DIR"/ "$DROPLET_USER@$DROPLET_HOST:$DEPLOY_PATH"

      - run:
          name: Delivery - Confirm delivery
          command: echo "Entrega completada correctamente"

workflows:
  ci-testing-delivery:
    jobs:
      - ci-build

      - testing:
          requires:
            - ci-build

      - delivery:
          requires:
            - testing
          filters:
            branches:
              only:
                - main