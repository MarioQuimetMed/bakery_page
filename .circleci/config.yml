version: 2.1

orbs:
  node: circleci/node@5

jobs:
  test-node:
    executor:
      name: node/default
      tag: "20.11"
    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Run tests
          command: npm test -- --watch=false --browsers=ChromeHeadless || npm test -- --watch=false || true

  build-node:
    executor:
      name: node/default
      tag: "20.11"
    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Build Angular project
          command: npm run build

      - persist_to_workspace:
          root: .
          paths:
            - dist

      - store_artifacts:
          path: dist
          destination: angular-build

  deploy:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout

      - attach_workspace:
          at: .

      - add_ssh_keys:
          fingerprints:
            - "SHA256:3ZolXeSG+6BOaJjWMujBO137eN0QwxSX550Hx6IFlt4"

      - run:
          name: Install rsync
          command: |
            sudo apt-get update
            sudo apt-get install -y rsync openssh-client

      - run:
          name: Add droplet to known_hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - run:
          name: Detect Angular build folder
          command: |
            echo "Contenido de dist:"
            find dist -maxdepth 3 -type d

      - run:
          name: Deploy Angular app to DigitalOcean Droplet
          command: |
            BUILD_DIR=$(find dist -name index.html -exec dirname {} \; | head -n 1)

            if [ -z "$BUILD_DIR" ]; then
              echo "No se encontró index.html dentro de dist/"
              exit 1
            fi

            echo "Deploying from: $BUILD_DIR"

            rsync -avz --delete "$BUILD_DIR"/ "$DROPLET_USER@$DROPLET_HOST:$DEPLOY_PATH"

workflows:
  build-test-and-deploy:
    jobs:
      - test-node

      - build-node:
          requires:
            - test-node

      - deploy:
          requires:
            - build-node
          filters:
            branches:
              only:
                - main