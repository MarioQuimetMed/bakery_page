<div class="login-wrapper">

  <main class="login-container">
    
    <section class="info-card">
      <p class="eyebrow">Diplomado DevOps</p>
      <h1>Grupo H</h1>
    </section>

    <section class="form-card">
      <div class="form-header">
        <h2>BAKERY CORE</h2>
        <p>Ingresa tus credenciales para acceder al sistema de gestión</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-wrapper">
            <input 
              id="email" 
              type="email" 
              formControlName="email" 
              placeholder="ejemplo@panaderia.com"
              [class.error-field]="isFieldInvalid('email')">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input 
              id="password" 
              type="password" 
              formControlName="password" 
              placeholder="••••••••"
              [class.error-field]="isFieldInvalid('password')">
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">
          Iniciar Sesión
        </button>

      </form>
    </section>

  </main>
</div>
