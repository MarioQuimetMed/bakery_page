<section class="contenedor-productos">
  <h2>Listado de Productos</h2>

  <div *ngIf="cargando" class="mensaje">Cargando productos...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!cargando && productos.length > 0" class="tabla-productos">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Imagen</th>
        <th>Creado</th>
        <th>Actualizado</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let producto of productos">
        <td>{{ producto.nombre }}</td>
        <td>{{ producto.descripcion }}</td>
        <td>
          <img *ngIf="producto.url_image" [src]="producto.url_image" alt="{{ producto.nombre }}" width="60">
          <span *ngIf="!producto.url_image">Sin imagen</span>
        </td>
        <td>{{ producto.created_at | date:'short' }}</td>
        <td>{{ producto.updated_at | date:'short' }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!cargando && productos.length === 0" class="mensaje">
    No existen productos registrados.
  </div>
</section>
